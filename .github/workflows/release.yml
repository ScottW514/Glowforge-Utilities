name: Release

# Build and publish the package to PyPI and GitHub Releases whenever a version
# tag is pushed (e.g. `v0.8.5` or `0.8.5`).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'   # v0.8.5, v0.8.5rc1, v1.2.3-post1, ...
      - '[0-9]+.[0-9]+.[0-9]+*'    # 0.8.5, ...

# Least privilege by default; jobs elevate only what they need.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & verify distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Verify the git tag matches the built package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          built="$(ls dist/*.whl | head -n1 | xargs -n1 basename | cut -d- -f2)"
          echo "git tag = ${tag}    built version = ${built}"
          if [ "${tag}" != "${built}" ]; then
            echo "::error::Git tag (${tag}) does not match the built package version (${built}). Update setup.py or the tag."
            exit 1
          fi

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Must match the GitHub environment configured in the PyPI trusted publisher.
    environment:
      name: pypi
      url: https://pypi.org/project/gfutilities/
    permissions:
      id-token: write          # OIDC token for PyPI Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Publish GitHub Release
    needs: pypi-publish
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the release and upload assets
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
